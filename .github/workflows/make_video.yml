# .github/workflows/make_video.yml
# ─────────────────────────────────────────────────────────
# This file goes in your GitHub repo at:
# .github/workflows/make_video.yml
#
# It runs automatically when Agentarium sends a trigger.
# You NEVER manually press Run.
# ─────────────────────────────────────────────────────────

name: Make Video

on:
  # Triggered by Agentarium when you send /make in Telegram
  repository_dispatch:
    types: [make_video]

  # Also allows manual test run from GitHub Actions tab
  workflow_dispatch:
    inputs:
      topic:
        description: "Video topic"
        required: true
        default: "The History of the Internet"
      schedule_time:
        description: "Publish time HH:MM UTC"
        required: true
        default: "18:00"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Kill if stuck after 1 hour

    steps:
      # Step 1: Get your code
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install system tools
      - name: Install FFmpeg and system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng

      # Step 4: Install Python packages
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            groq \
            google-generativeai \
            edge-tts \
            gtts \
            requests \
            beautifulsoup4 \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2

      # Step 5: Write token.json for YouTube (stored as a secret)
      - name: Setup YouTube auth token
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json

      # Step 6: Run the pipeline
      - name: Run pipeline
        env:
          GROQ_KEY:         ${{ secrets.GROQ_KEY }}
          GEMINI_KEY:       ${{ secrets.GEMINI_KEY }}
          PEXELS_KEY:       ${{ secrets.PEXELS_KEY }}
          PIXABAY_KEY:      ${{ secrets.PIXABAY_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN_1:       ${{ secrets.HF_TOKEN_1 }}
          HF_TOKEN_2:       ${{ secrets.HF_TOKEN_2 }}
          HF_TOKEN_3:       ${{ secrets.HF_TOKEN_3 }}
          # These come from Agentarium's trigger payload
          TOPIC: ${{ github.event.client_payload.raw_input || github.event.inputs.topic }}
          SCHEDULE_TIME:    ${{ github.event.client_payload.time || github.event.inputs.schedule_time }}
        run: python pipeline.py

      # Step 7: Save workspace files for debugging if something fails
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-workspace
          path: workspace_*/
          retention-days: 3
