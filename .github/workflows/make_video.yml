name: Make Video

on:
  repository_dispatch:
    types: [make_video]

  workflow_dispatch:
    inputs:
      topic:
        description: "Topic (with optional --genre --lang --duration flags)"
        required: true
        default: "Paytm का सच --genre documentary --lang hindi --duration 8"
      schedule_time:
        description: "Upload time HH:MM UTC"
        required: true
        default: "18:00"
      niche:
        description: "Niche for daily auto mode: finance | tech | crime (leave empty for manual)"
        required: false
        default: ""
      script:
        description: "Optional: paste your script here"
        required: false
        default: ""

  workflow_call:
    inputs:
      raw_video_json:
        type: string
        required: false
        default: ""

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            groq \
            google-generativeai \
            edge-tts \
            gtts \
            requests \
            beautifulsoup4 \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2 \
            kokoro \
            onnxruntime \
            pydub \
            soundfile \
            numpy \
            scipy \
            duckduckgo-search

      - name: Parse input (handle all 3 trigger modes)
        id: parse
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          github_output = os.environ.get("GITHUB_OUTPUT", "")
          raw_json   = "${{ inputs.raw_video_json }}"
          dispatch_topic  = "${{ github.event.client_payload.topic }}"
          dispatch_niche  = "${{ github.event.client_payload.niche }}"
          dispatch_script = "${{ github.event.client_payload.script }}"
          manual_topic    = "${{ inputs.topic }}"
          manual_time     = "${{ inputs.schedule_time }}"
          manual_niche    = "${{ inputs.niche }}"
          manual_script   = "${{ inputs.script }}"

          topic = ""; niche = ""; script = ""; sched = "18:00"

          if raw_json and raw_json.strip() and raw_json != "":
              try:
                  v = json.loads(raw_json)
                  topic  = v.get("topic","")
                  niche  = v.get("niche","")
                  sched  = v.get("time","18:00")
                  script = v.get("script","") or ""
                  topic  = f"{topic} {sched}"
              except: pass

          elif dispatch_topic:
              topic  = dispatch_topic
              niche  = dispatch_niche
              script = dispatch_script

          elif manual_topic:
              topic  = f"{manual_topic} {manual_time}"
              niche  = manual_niche
              script = manual_script

          with open(github_output, "a") as f:
              f.write(f"TOPIC={topic}\n")
              f.write(f"NICHE={niche}\n")
              f.write(f"SCRIPT={script[:500] if script else ''}\n")

          print(f"Topic: {topic}")
          print(f"Niche: {niche}")
          print(f"Has script: {'yes' if script else 'no'}")
          PYEOF

      - name: Write YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json

      - name: Setup Colab CLI auth (for cartoon genre Wan2.1 generation)
        run: |
          if [ -n "${{ secrets.COLAB_TOKEN }}" ]; then
            mkdir -p ~/.config/colab-cli
            echo '${{ secrets.COLAB_TOKEN }}' > ~/.config/colab-cli/token.json
            pip install -q google-colab-cli || echo "google-colab-cli install failed — Wan2.1 will be skipped this run, Pollinations fallback will be used instead"
          else
            echo "COLAB_TOKEN not set — skipping Colab CLI setup, cartoon genre will use Pollinations"
          fi
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Remotion Dependencies
        run: |
          if [ -d "remotion" ]; then
            cd remotion
            npm install
          fi

      - name: Run pipeline
        env:
          GROQ_KEY:            ${{ secrets.GROQ_KEY }}
          GEMINI_KEY:          ${{ secrets.GEMINI_KEY }}
          GEMINI_KEY_2:        ${{ secrets.GEMINI_KEY_2 }}
          PEXELS_KEY:          ${{ secrets.PEXELS_KEY }}
          PIXABAY_KEY:         ${{ secrets.PIXABAY_KEY }}
          FREESOUND_KEY:       ${{ secrets.FREESOUND_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_TOKEN_JSON:  ${{ secrets.YOUTUBE_TOKEN_JSON }}
          COLAB_TOKEN:         ${{ secrets.COLAB_TOKEN }}
          KLING_API_KEY:       ${{ secrets.KLING_API_KEY }}
          HF_TOKEN_1:          ${{ secrets.HF_TOKEN_1 }}
          HF_TOKEN_2:          ${{ secrets.HF_TOKEN_2 }}
          HF_TOKEN_3:          ${{ secrets.HF_TOKEN_3 }}
          TOPIC:               ${{ steps.parse.outputs.TOPIC }}
          NICHE:               ${{ steps.parse.outputs.NICHE }}
          SCRIPT:              ${{ steps.parse.outputs.SCRIPT }}
        run: python pipeline.py

      - name: Upload debug workspace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-${{ github.run_id }}
          path: workspace_*/
          retention-days: 3